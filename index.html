<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowcus - Productivity Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
        .dark {
            background-color: #09090b;
            color: white;
        }
    </style>
</head>
<body class="transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Inline SVG Icons
        const Icons = {
            Plus: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 12h14m-7-7v14"/></svg>,
            CheckCircle2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Circle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/></svg>,
            Trash2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 9 2 2 4-4m-4 4-2-2"/></svg>,
            Calendar: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
            LayoutDashboard: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            TrendingUp: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
            Clock: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            ChevronRight: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m9 18 6-6-6-6"/></svg>,
            ChevronLeft: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m15 18-6-6 6-6"/></svg>,
            X: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18M6 6l12 12"/></svg>,
            Edit2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Search: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Moon: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>,
            Archive: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>,
            Download: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Focus: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="3"/><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
        };

        const DEFAULT_CATEGORIES = [
            { id: 'today', name: 'Today', color: 'bg-zinc-900' },
            { id: 'work', name: 'Work', color: 'bg-blue-600' },
            { id: 'personal', name: 'Personal', color: 'bg-purple-600' },
        ];

        function App() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('flowcus_tasks');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return parsed.map(t => ({
                        ...t,
                        priority: t.priority || 'medium',
                        subtasks: t.subtasks || [],
                        archived: !!t.archived,
                        notes: t.notes || '',
                    }));
                }
                return [
                    { id: '1', text: 'Design new dashboard layout', completed: false, category: 'work', createdAt: Date.now(), dueDate: new Date().toISOString().split('T')[0], priority: 'high', subtasks: [], archived: false, notes: 'Focus on the user experience.' },
                    { id: '2', text: 'Review project milestones', completed: true, category: 'work', createdAt: Date.now() - 86400000, priority: 'medium', subtasks: [], archived: false },
                    { id: '3', text: 'Evening meditation', completed: false, category: 'personal', createdAt: Date.now(), priority: 'low', subtasks: [], archived: false },
                ];
            });

            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('flowcus_categories');
                return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
            });

            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('flowcus_dark') === 'true');
            const [newTaskText, setNewTaskText] = useState('');
            const [newTaskCategory, setNewTaskCategory] = useState('today');
            const [newTaskPriority, setNewTaskPriority] = useState('medium');
            const [newTaskDate, setNewTaskDate] = useState(new Date().toISOString().split('T')[0]);
            const [activeTab, setActiveTab] = useState('all');
            const [currentView, setCurrentView] = useState('dashboard');
            const [editingTask, setEditingTask] = useState(null);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState('');
            const [newCategoryColor, setNewCategoryColor] = useState('bg-blue-500');
            const [searchQuery, setSearchQuery] = useState('');
            const [pomodoroTime, setPomodoroTime] = useState(25 * 60);
            const [pomodoroActive, setPomodoroActive] = useState(false);
            const [pomodoroType, setPomodoroType] = useState('work');
            const [focusTask, setFocusTask] = useState(null);
            const [calendarDate, setCalendarDate] = useState(new Date());
            const [userName, setUserName] = useState(() => localStorage.getItem('flowcus_user_name') || '');

            useEffect(() => {
                localStorage.setItem('flowcus_tasks', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem('flowcus_categories', JSON.stringify(categories));
            }, [categories]);

            useEffect(() => {
                localStorage.setItem('flowcus_user_name', userName);
            }, [userName]);

            useEffect(() => {
                localStorage.setItem('flowcus_dark', String(darkMode));
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            useEffect(() => {
                let interval;
                if (pomodoroActive && pomodoroTime > 0) {
                    interval = setInterval(() => {
                        setPomodoroTime(prev => prev - 1);
                    }, 1000);
                } else if (pomodoroTime === 0) {
                    setPomodoroActive(false);
                    const nextType = pomodoroType === 'work' ? 'break' : 'work';
                    setPomodoroType(nextType);
                    setPomodoroTime(nextType === 'work' ? 25 * 60 : 5 * 60);
                    if (Notification.permission === 'granted') {
                        new Notification(nextType === 'work' ? 'Time to focus!' : 'Take a break!');
                    }
                }
                return () => clearInterval(interval);
            }, [pomodoroActive, pomodoroTime, pomodoroType]);

            const streak = useMemo(() => {
                const completedDates = Array.from(new Set(tasks
                    .filter(t => t.completed)
                    .map(t => new Date(t.createdAt).toISOString().split('T')[0])
                )).sort().reverse();

                let currentStreak = 0;
                const today = new Date().toISOString().split('T')[0];
                const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

                if (completedDates.includes(today) || completedDates.includes(yesterday)) {
                    let checkDate = completedDates.includes(today) ? today : yesterday;
                    let checkIdx = completedDates.indexOf(checkDate);
                    
                    while (checkIdx !== -1) {
                        currentStreak++;
                        const prevDate = new Date(new Date(checkDate).getTime() - 86400000).toISOString().split('T')[0];
                        checkIdx = completedDates.indexOf(prevDate);
                        checkDate = prevDate;
                    }
                }
                return currentStreak;
            }, [tasks]);

            const stats = useMemo(() => {
                const completed = tasks.filter(t => t.completed && !t.archived).length;
                const total = tasks.filter(t => !t.archived).length;
                const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
                return { completed, total, percentage };
            }, [tasks]);

            const filteredTasks = useMemo(() => {
                let result = tasks;
                
                if (activeTab === 'archived') {
                    result = result.filter(t => t.archived);
                } else {
                    result = result.filter(t => !t.archived);
                    if (activeTab === 'today') {
                        const today = new Date().toISOString().split('T')[0];
                        result = result.filter(t => t.dueDate === today || (!t.dueDate && t.category === 'today'));
                    } else if (activeTab === 'upcoming') {
                        const today = new Date().toISOString().split('T')[0];
                        result = result.filter(t => t.dueDate && t.dueDate > today);
                    }
                }

                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    result = result.filter(t => 
                        t.text.toLowerCase().includes(query) || 
                        (t.notes && t.notes.toLowerCase().includes(query))
                    );
                }

                return result;
            }, [tasks, activeTab, searchQuery]);

            const addTask = (e) => {
                e.preventDefault();
                if (!newTaskText.trim()) return;

                const newTask = {
                    id: Math.random().toString(36).substr(2, 9),
                    text: newTaskText,
                    completed: false,
                    category: newTaskCategory,
                    createdAt: Date.now(),
                    dueDate: newTaskDate,
                    priority: newTaskPriority,
                    subtasks: [],
                    archived: false,
                    notes: '',
                };

                setTasks([newTask, ...tasks]);
                setNewTaskText('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            const archiveTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, archived: !t.archived } : t));
            };

            const updateTask = (updatedTask) => {
                setTasks(tasks.map(t => t.id === updatedTask.id ? updatedTask : t));
                setEditingTask(null);
            };

            const addCategory = () => {
                if (!newCategoryName.trim()) return;
                const newCat = {
                    id: newCategoryName.toLowerCase().replace(/\s+/g, '-'),
                    name: newCategoryName,
                    color: newCategoryColor
                };
                setCategories([...categories, newCat]);
                setNewCategoryName('');
                setShowCategoryModal(false);
            };

            const deleteCategory = (id) => {
                if (DEFAULT_CATEGORIES.some(c => c.id === id)) return;
                setCategories(categories.filter(c => c.id !== id));
            };

            const exportData = () => {
                const data = { tasks, categories };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'flowcus_backup.json';
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.tasks && data.categories) {
                            setTasks(data.tasks);
                            setCategories(data.categories);
                        }
                    } catch (err) {
                        console.error("Failed to import data", err);
                    }
                };
                reader.readAsText(file);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const calendarDays = useMemo(() => {
                const year = calendarDate.getFullYear();
                const month = calendarDate.getMonth();
                const days = daysInMonth(year, month);
                const firstDay = firstDayOfMonth(year, month);
                
                const prevMonthDays = daysInMonth(year, month - 1);
                const prevDays = Array.from({ length: firstDay }, (_, i) => ({
                    day: prevMonthDays - firstDay + i + 1,
                    month: month - 1,
                    year,
                    currentMonth: false
                }));

                const currentDays = Array.from({ length: days }, (_, i) => ({
                    day: i + 1,
                    month,
                    year,
                    currentMonth: true
                }));

                const nextDays = Array.from({ length: 42 - prevDays.length - currentDays.length }, (_, i) => ({
                    day: i + 1,
                    month: month + 1,
                    year,
                    currentMonth: false
                }));

                return [...prevDays, ...currentDays, ...nextDays];
            }, [calendarDate]);

            return (
                <div className={`min-h-screen flex flex-col md:flex-row font-sans transition-colors duration-200 ${darkMode ? 'bg-zinc-950 text-white' : 'bg-[#F8F9FA] text-zinc-900'}`}>
                    {/* Mobile Header */}
                    <header className={`md:hidden border-b p-4 flex items-center justify-between sticky top-0 z-40 ${darkMode ? 'bg-zinc-900 border-zinc-800' : 'bg-white border-zinc-200'}`}>
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-lg overflow-hidden shadow-lg shadow-emerald-500/20 bg-gradient-to-br from-[#1E88E5] to-[#43A047] flex items-center justify-center">
                                <span className="text-white font-bold text-xs">FL</span>
                            </div>
                            <span className="font-bold text-lg tracking-tight">Flowcus</span>
                        </div>
                        <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl bg-zinc-100 dark:bg-zinc-800">
                            {darkMode ? <Icons.Sun size={18} /> : <Icons.Moon size={18} />}
                        </button>
                    </header>

                    {/* Sidebar */}
                    <aside className={`w-64 border-r p-6 flex flex-col gap-8 hidden md:flex sticky top-0 h-screen ${darkMode ? 'bg-zinc-900 border-zinc-800' : 'bg-white border-zinc-200'}`}>
                        <div className="flex items-center gap-3 px-2">
                            <div className="w-10 h-10 rounded-2xl overflow-hidden shadow-lg shadow-emerald-500/20 bg-gradient-to-br from-[#1E88E5] to-[#43A047] flex items-center justify-center">
                                <span className="text-white font-bold text-sm">FL</span>
                            </div>
                            <span className="font-bold text-xl tracking-tight">Flowcus</span>
                        </div>

                        <nav className="flex flex-col gap-1">
                            <div className="px-3 py-2 mb-2">
                                <label className="text-[10px] font-bold uppercase tracking-wider text-zinc-500 block mb-2">Your Name</label>
                                <input 
                                    type="text"
                                    value={userName}
                                    onChange={(e) => setUserName(e.target.value)}
                                    placeholder="Enter your name"
                                    className={`w-full text-sm bg-transparent border-b outline-none pb-1 transition-colors ${darkMode ? 'border-zinc-800 focus:border-zinc-600' : 'border-zinc-200 focus:border-zinc-400'}`}
                                />
                            </div>
                            <button 
                                onClick={() => { setCurrentView('dashboard'); setActiveTab('all'); }}
                                className={`flex items-center gap-3 px-3 py-2 rounded-xl transition-colors ${currentView === 'dashboard' && activeTab === 'all' ? (darkMode ? 'bg-zinc-800 text-white' : 'bg-zinc-100 text-zinc-900') : 'text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                            >
                                <Icons.LayoutDashboard size={18} />
                                Dashboard
                            </button>
                            <button 
                                onClick={() => { setCurrentView('dashboard'); setActiveTab('today'); }}
                                className={`flex items-center gap-3 px-3 py-2 rounded-xl transition-colors ${currentView === 'dashboard' && activeTab === 'today' ? (darkMode ? 'bg-zinc-800 text-white' : 'bg-zinc-100 text-zinc-900') : 'text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                            >
                                <Icons.Clock size={18} />
                                Today
                            </button>
                            <button 
                                onClick={() => setCurrentView('calendar')}
                                className={`flex items-center gap-3 px-3 py-2 rounded-xl transition-colors ${currentView === 'calendar' ? (darkMode ? 'bg-zinc-800 text-white' : 'bg-zinc-100 text-zinc-900') : 'text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                            >
                                <Icons.Calendar size={18} />
                                Calendar
                            </button>
                            <button 
                                onClick={() => { setCurrentView('dashboard'); setActiveTab('archived'); }}
                                className={`flex items-center gap-3 px-3 py-2 rounded-xl transition-colors ${activeTab === 'archived' ? (darkMode ? 'bg-zinc-800 text-white' : 'bg-zinc-100 text-zinc-900') : 'text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                            >
                                <Icons.Archive size={18} />
                                Archived
                            </button>
                        </nav>

                        {/* Pomodoro Timer */}
                        <div className={`p-4 rounded-2xl border ${darkMode ? 'bg-zinc-800/50 border-zinc-700' : 'bg-zinc-50 border-zinc-100'}`}>
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-zinc-500">{pomodoroType} Session</span>
                                <Icons.Clock size={14} className="text-zinc-400" />
                            </div>
                            <div className="text-3xl font-bold mb-4 tabular-nums">{formatTime(pomodoroTime)}</div>
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => setPomodoroActive(!pomodoroActive)}
                                    className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${pomodoroActive ? 'bg-red-500 text-white' : 'bg-zinc-900 text-white dark:bg-white dark:text-zinc-900'}`}
                                >
                                    {pomodoroActive ? 'Pause' : 'Start'}
                                </button>
                                <button 
                                    onClick={() => { setPomodoroActive(false); setPomodoroTime(pomodoroType === 'work' ? 25 * 60 : 5 * 60); }}
                                    className="p-2 rounded-xl bg-zinc-200 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300"
                                >
                                    <Icons.X size={16} />
                                </button>
                            </div>
                        </div>

                        <div className="mt-auto flex flex-col gap-4">
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                className="flex items-center gap-3 px-3 py-2 rounded-xl text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors"
                            >
                                {darkMode ? <Icons.Sun size={18} /> : <Icons.Moon size={18} />}
                                {darkMode ? 'Light Mode' : 'Dark Mode'}
                            </button>
                            <button 
                                onClick={exportData}
                                className="flex items-center gap-3 px-3 py-2 rounded-xl text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors"
                            >
                                <Icons.Download size={18} />
                                Export Data
                            </button>

                                    </div>
                                    <div className="pt-4 border-t border-zinc-100 dark:border-zinc-800">
                                        <label className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2 block">New Category</label>
                                        <div className="flex gap-2 mb-4">
                                            <input type="text" value={newCategoryName} onChange={(e) => setNewCategoryName(e.target.value)} placeholder="Category name" className={`flex-1 px-4 py-2 rounded-xl border outline-none ${darkMode ? 'bg-zinc-800 border-zinc-700' : 'bg-zinc-50 border-zinc-100'}`} />
                                            <button onClick={addCategory} className="bg-zinc-900 dark:bg-white dark:text-zinc-900 text-white px-4 py-2 rounded-xl font-bold text-sm">Add</button>
                                        </div>
                                        <div className="flex gap-2 justify-center">
                                            {['bg-blue-500', 'bg-emerald-500', 'bg-orange-500', 'bg-purple-500', 'bg-pink-500', 'bg-red-500'].map(color => (
                                                <button key={color} onClick={() => setNewCategoryColor(color)} className={`w-8 h-8 rounded-full transition-all ${color} ${newCategoryColor === color ? 'ring-2 ring-offset-2 ring-zinc-500' : ''}`} />
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setShowCategoryModal(false)} className="w-full py-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 font-bold">Done</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
